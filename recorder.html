<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>録音 — 歯科SOAPシステム</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F6F3;
  --surface: #FFFFFF;
  --surface-alt: #F0EFEC;
  --border: #E2E0DB;
  --text: #1A1A1A;
  --text-muted: #6B6963;
  --text-light: #9B978F;
  --accent: #3B82C4;
  --accent-hover: #2D6BA3;
  --accent-light: #EBF3FB;
  --recording: #DC4545;
  --recording-light: #FEF0F0;
  --recording-pulse: #DC454580;
  --success: #2D8A56;
  --success-light: #ECF7F0;
  --warning: #C4882E;
  --warning-light: #FFF8ED;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --radius: 10px;
  --radius-lg: 16px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans JP', 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  -webkit-font-smoothing: antialiased;
}

.container {
  width: 100%;
  max-width: 480px;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 32px;
}
.header-logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.header-logo-icon {
  width: 40px; height: 40px;
  background: var(--accent);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 20px; font-weight: 700;
}
.header-title {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.header-phase {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  background: var(--accent-light);
  color: var(--accent);
}
.header-phase.phase-exam {
  background: var(--warning-light);
  color: var(--warning);
}

/* Card */
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  margin-bottom: 16px;
}
.card-body {
  padding: 28px 24px;
}

/* Status ring + mic button */
.rec-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: 8px 0 4px;
}

.rec-ring-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

.rec-ring {
  position: absolute;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: transparent;
  border: 3px solid var(--border);
  transition: border-color 0.3s;
  pointer-events: none;
}
.rec-ring.pulse {
  border-color: var(--recording-pulse);
  animation: ringPulse 1.8s ease-in-out infinite;
}
@keyframes ringPulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.18); opacity: 0; }
}

.rec-btn {
  width: 96px; height: 96px;
  border-radius: 50%;
  border: 3px solid var(--recording);
  background: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  position: relative;
  z-index: 1;
  -webkit-tap-highlight-color: transparent;
}
.rec-btn:hover { background: var(--recording-light); transform: scale(1.04); }
.rec-btn:active { transform: scale(0.97); }

.rec-btn .rec-inner {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--recording);
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.rec-btn.active {
  border-color: var(--recording);
  background: var(--recording-light);
  box-shadow: 0 0 0 0 var(--recording-pulse);
  animation: btnGlow 2s ease-in-out infinite;
}
@keyframes btnGlow {
  0%, 100% { box-shadow: 0 0 0 0 var(--recording-pulse); }
  50% { box-shadow: 0 0 0 14px transparent; }
}
.rec-btn.active .rec-inner {
  border-radius: 6px;
  width: 30px; height: 30px;
}

/* Timer */
.timer-display {
  font-family: 'IBM Plex Sans', monospace;
  font-size: 42px;
  font-weight: 300;
  letter-spacing: 0.04em;
  color: var(--text);
  line-height: 1;
}
.timer-display.recording {
  color: var(--recording);
}

/* Waveform */
.waveform {
  height: 44px;
  background: var(--surface-alt);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 0 16px;
  overflow: hidden;
  width: 100%;
}
.wave-bar {
  width: 3px;
  height: 6px;
  background: var(--border);
  border-radius: 2px;
  transition: background 0.3s;
}
.waveform.active .wave-bar {
  background: var(--recording);
  animation: wave 0.8s ease-in-out infinite;
}
@keyframes wave {
  0%, 100% { height: 6px; }
  50% { height: var(--h, 28px); }
}

/* State label */
.state-label {
  font-size: 13px;
  color: var(--text-muted);
  text-align: center;
  min-height: 20px;
  font-weight: 500;
}
.state-label.active { color: var(--recording); }
.state-label.done { color: var(--success); }
.state-label.error { color: var(--recording); }

/* Done view */
.done-card {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 8px 0;
}
.done-card.visible { display: flex; }
.done-icon {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: var(--success-light);
  border: 2px solid var(--success);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}
.done-title {
  font-size: 17px;
  font-weight: 600;
  color: var(--success);
  text-align: center;
}
.done-meta {
  font-size: 12px;
  color: var(--text-muted);
  text-align: center;
  line-height: 1.6;
}
.done-size {
  font-family: 'IBM Plex Sans', monospace;
  font-size: 13px;
  color: var(--text-muted);
}

/* Progress bar (送信中) */
.progress-wrap {
  width: 100%;
  display: none;
}
.progress-wrap.visible { display: block; }
.progress-bar-bg {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #48A0E8);
  border-radius: 3px;
  width: 0%;
  transition: width 0.4s ease;
  animation: progressShimmer 1.5s ease-in-out infinite;
}
@keyframes progressShimmer {
  0% { filter: brightness(1); }
  50% { filter: brightness(1.15); }
  100% { filter: brightness(1); }
}
.progress-label {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 6px;
  text-align: center;
  font-weight: 500;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 13px 28px;
  border: none;
  border-radius: var(--radius);
  font-family: inherit;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  width: 100%;
}
.btn-primary {
  background: var(--accent);
  color: white;
}
.btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.btn-primary:disabled { background: var(--border); color: var(--text-light); cursor: not-allowed; transform: none; box-shadow: none; }
.btn-outline {
  background: var(--surface);
  color: var(--text);
  border: 1.5px solid var(--border);
}
.btn-outline:hover { background: var(--surface-alt); }
.btn-outline:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-success {
  background: var(--success);
  color: white;
}
.btn-success:hover { background: #247A4A; transform: translateY(-1px); box-shadow: var(--shadow-md); }

.btn-row {
  display: flex;
  gap: 10px;
  margin-top: 4px;
}
.btn-row .btn { flex: 1; }

/* Info footer */
.info-footer {
  text-align: center;
  font-size: 11px;
  color: var(--text-light);
  line-height: 1.6;
  margin-top: 4px;
}
.info-footer strong { color: var(--text-muted); }

/* Permission denied state */
.perm-denied {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  padding: 8px 0;
  text-align: center;
}
.perm-denied.visible { display: flex; }
.perm-denied-icon { font-size: 40px; }
.perm-denied-title { font-size: 15px; font-weight: 600; color: var(--recording); }
.perm-denied-desc { font-size: 12px; color: var(--text-muted); line-height: 1.6; }

/* Toast */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: #1A1A1A;
  color: white;
  padding: 10px 20px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 999;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* Error state */
.error-banner {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: var(--recording-light);
  border: 1.5px solid var(--recording);
  border-radius: var(--radius);
  font-size: 12px;
  color: var(--recording);
  font-weight: 500;
  margin-top: 8px;
}
.error-banner.visible { display: flex; }

@media (max-width: 400px) {
  body { padding: 16px; }
  .timer-display { font-size: 36px; }
  .rec-btn { width: 84px; height: 84px; }
  .rec-btn .rec-inner { width: 34px; height: 34px; }
}
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <div class="header-logo-icon">歯</div>
      <div class="header-title">SOAP録音</div>
    </div>
    <br>
    <div class="header-phase" id="phaseLabel">カウンセリング録音</div>
  </div>

  <!-- Main Card -->
  <div class="card">
    <div class="card-body">

      <!-- Normal recording view -->
      <div id="recordingView">
        <div class="rec-center">
          <!-- Waveform -->
          <div class="waveform" id="waveform"></div>

          <!-- Ring + Button -->
          <div class="rec-ring-wrapper">
            <div class="rec-ring" id="recRing"></div>
            <button class="rec-btn" id="recBtn" onclick="toggleRecording()">
              <div class="rec-inner" id="recInner"></div>
            </button>
          </div>

          <!-- Timer -->
          <div class="timer-display" id="timerDisplay">00:00</div>

          <!-- State label -->
          <div class="state-label" id="stateLabel">タップして録音開始</div>
        </div>

        <!-- Error banner -->
        <div class="error-banner" id="errorBanner">
          <span>⚠</span>
          <span id="errorText"></span>
        </div>
      </div>

      <!-- Permission denied view -->
      <div class="perm-denied" id="permDenied">
        <div class="perm-denied-icon">🎙️</div>
        <div class="perm-denied-title">マイクへのアクセスが拒否されました</div>
        <div class="perm-denied-desc">
          ブラウザのアドレスバー横の🔒マークをタップし、<br>
          「マイク」を「許可」に変更してページを再読み込みしてください。
        </div>
        <button class="btn btn-outline" onclick="location.reload()">🔄 再読み込み</button>
      </div>

      <!-- Done view -->
      <div class="done-card" id="doneCard">
        <div class="done-icon">✓</div>
        <div class="done-title">録音完了</div>
        <div class="done-meta" id="doneMeta">録音データを親画面に送信しました</div>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressFill"></div>
          </div>
          <div class="progress-label" id="progressLabel">送信中...</div>
        </div>
      </div>

    </div>
  </div>

  <!-- Action buttons -->
  <div id="actionArea">
    <div class="btn-row" id="recordingBtns">
      <button class="btn btn-outline" id="btnReset" onclick="resetRecording()" disabled>やり直し</button>
      <button class="btn btn-primary" id="btnSend" onclick="sendAudio()" disabled>✓ 送信して文字起こし</button>
    </div>
  </div>

  <div class="info-footer" style="margin-top:14px;">
    <strong>録音上限：25MB</strong>（約40〜60分）<br>
    録音完了後「送信して文字起こし」をタップしてください
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// 設定
// ============================================================
const ALLOWED_ORIGIN = '*'; // 本番では GAS WebApp URL を指定
                              // 例: 'https://script.google.com'

// ============================================================
// 状態変数
// ============================================================
let mediaRecorder = null;
let audioChunks   = [];
let audioBlob     = null;
let timerInterval = null;
let seconds       = 0;
let isRecording   = false;
let stream        = null;
let phaseId       = 'counseling'; // URLパラメータから取得

// ============================================================
// 初期化
// ============================================================
(function init() {
  // URLパラメータから phase を取得
  const params = new URLSearchParams(window.location.search);
  phaseId = params.get('phase') || 'counseling';
  const phaseNames = {
    counseling : 'カウンセリング録音',
    exam       : '診察録音',
    ortho      : '矯正相談録音',
    implant    : '治療相談録音',
  };
  const label = document.getElementById('phaseLabel');
  label.textContent = phaseNames[phaseId] || '録音';
  if (phaseId === 'exam' || phaseId === 'ortho' || phaseId === 'implant') {
    label.classList.add('phase-exam');
  }

  // Waveform bars を生成
  const wf = document.getElementById('waveform');
  for (let i = 0; i < 48; i++) {
    const b = document.createElement('div');
    b.className = 'wave-bar';
    b.style.setProperty('--h', (Math.random() * 26 + 8) + 'px');
    b.style.animationDelay = (Math.random() * 0.8) + 's';
    wf.appendChild(b);
  }

  // マイク権限を事前チェック
  if (navigator.permissions && navigator.permissions.query) {
    navigator.permissions.query({ name: 'microphone' }).then(function(result) {
      if (result.state === 'denied') {
        showPermDenied();
      }
    }).catch(function() {
      // permissionsAPIが使えない場合は無視
    });
  }
})();

// ============================================================
// 録音 制御
// ============================================================
async function toggleRecording() {
  if (isRecording) {
    stopRecording();
  } else {
    await startRecording();
  }
}

async function startRecording() {
  hideError();
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        sampleRate: 44100,
      }
    });
  } catch (err) {
    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      showPermDenied();
    } else {
      showError('マイクにアクセスできませんでした: ' + err.message);
    }
    return;
  }

  // MIME type の選択（iOS Safari は audio/mp4、それ以外は webm を優先）
  const mimeType = getSupportedMimeType();
  const options  = mimeType ? { mimeType } : {};

  audioChunks  = [];
  mediaRecorder = new MediaRecorder(stream, options);

  mediaRecorder.ondataavailable = function(e) {
    if (e.data && e.data.size > 0) audioChunks.push(e.data);
  };

  mediaRecorder.onstop = function() {
    const mime = mediaRecorder.mimeType || mimeType || 'audio/webm';
    audioBlob = new Blob(audioChunks, { type: mime });
    onRecordingStopped();
  };

  mediaRecorder.onerror = function(e) {
    showError('録音エラー: ' + e.error.message);
    stopRecording();
  };

  // 250ms ごとにデータを取得（長時間録音でメモリを分割）
  mediaRecorder.start(250);
  isRecording = true;

  // UI
  document.getElementById('recBtn').classList.add('active');
  document.getElementById('recRing').classList.add('pulse');
  document.getElementById('waveform').classList.add('active');
  document.getElementById('timerDisplay').classList.add('recording');
  setStateLabel('● 録音中', 'active');
  document.getElementById('btnReset').disabled = false;

  // Timer
  seconds = 0;
  updateTimer();
  timerInterval = setInterval(updateTimer, 1000);
}

function stopRecording() {
  if (!mediaRecorder || mediaRecorder.state === 'inactive') return;
  clearInterval(timerInterval);
  mediaRecorder.stop();
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  isRecording = false;

  // UI
  document.getElementById('recBtn').classList.remove('active');
  document.getElementById('recRing').classList.remove('pulse');
  document.getElementById('waveform').classList.remove('active');
  document.getElementById('timerDisplay').classList.remove('recording');
  setStateLabel('処理中...', '');
}

function onRecordingStopped() {
  const sizeMB = (audioBlob.size / 1024 / 1024).toFixed(2);

  if (audioBlob.size > 25 * 1024 * 1024) {
    showError('ファイルサイズが25MBを超えています（' + sizeMB + 'MB）。録音を短くしてください。');
    resetRecording();
    return;
  }

  setStateLabel('録音完了（' + sizeMB + ' MB）', 'done');
  document.getElementById('btnSend').disabled = false;
  showToast('録音完了しました');
}

function resetRecording() {
  if (isRecording) {
    stopRecording();
    // stopRecording は非同期的にonstopを呼ぶので少し待つ
    setTimeout(doReset, 300);
  } else {
    doReset();
  }
}

function doReset() {
  audioBlob = null;
  audioChunks = [];
  seconds = 0;
  document.getElementById('timerDisplay').textContent = '00:00';
  document.getElementById('timerDisplay').classList.remove('recording');
  document.getElementById('btnSend').disabled = true;
  document.getElementById('btnReset').disabled = true;
  document.getElementById('waveform').classList.remove('active');
  document.getElementById('recBtn').classList.remove('active');
  document.getElementById('recRing').classList.remove('pulse');
  setStateLabel('タップして録音開始', '');
  hideError();
}

// ============================================================
// 送信（postMessage）
// ============================================================
async function sendAudio() {
  if (!audioBlob) { showToast('録音データがありません'); return; }

  // UI: 送信中
  document.getElementById('btnSend').disabled = true;
  document.getElementById('btnReset').disabled = true;
  setStateLabel('送信中...', '');
  showProgress(true, '音声データを変換中...', 0);

  try {
    // Blob → Base64
    const base64 = await blobToBase64(audioBlob, function(pct) {
      showProgress(true, '音声データを変換中... ' + pct + '%', pct * 0.7);
    });

    showProgress(true, '親画面へ送信中...', 70);

    // postMessage で親ウィンドウに送る
    const message = {
      type    : 'SOAP_RECORDER_DONE',
      phase   : phaseId,
      base64  : base64,
      mimeType: audioBlob.type || 'audio/webm',
      sizeMB  : parseFloat((audioBlob.size / 1024 / 1024).toFixed(2)),
      durationSec: seconds,
    };

    const target = window.opener || window.parent;
    if (!target) {
      throw new Error('親ウィンドウが見つかりません');
    }

    target.postMessage(message, ALLOWED_ORIGIN);

    showProgress(true, '送信完了！', 100);
    setTimeout(function() {
      showDone();
    }, 400);

  } catch (err) {
    showError('送信に失敗しました: ' + err.message);
    document.getElementById('btnSend').disabled = false;
    document.getElementById('btnReset').disabled = false;
    showProgress(false);
  }
}

// ============================================================
// Base64変換（進捗コールバック付き）
// ============================================================
function blobToBase64(blob, onProgress) {
  return new Promise(function(resolve, reject) {
    const reader = new FileReader();
    reader.onprogress = function(e) {
      if (e.lengthComputable && onProgress) {
        onProgress(Math.round((e.loaded / e.total) * 100));
      }
    };
    reader.onload = function(e) {
      const base64 = e.target.result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = function() { reject(new Error('ファイル読み込み失敗')); };
    reader.readAsDataURL(blob);
  });
}

// ============================================================
// MIME type 選択
// ============================================================
function getSupportedMimeType() {
  const candidates = [
    'audio/webm;codecs=opus',
    'audio/webm',
    'audio/ogg;codecs=opus',
    'audio/mp4',
    'audio/mpeg',
  ];
  for (const mt of candidates) {
    if (MediaRecorder.isTypeSupported(mt)) return mt;
  }
  return '';
}

// ============================================================
// UI ヘルパー
// ============================================================
function updateTimer() {
  seconds++;
  const m = String(Math.floor(seconds / 60)).padStart(2, '0');
  const s = String(seconds % 60).padStart(2, '0');
  document.getElementById('timerDisplay').textContent = m + ':' + s;
}

function setStateLabel(text, cls) {
  const el = document.getElementById('stateLabel');
  el.textContent = text;
  el.className = 'state-label' + (cls ? ' ' + cls : '');
}

function showError(msg) {
  const el = document.getElementById('errorBanner');
  document.getElementById('errorText').textContent = msg;
  el.classList.add('visible');
}
function hideError() {
  document.getElementById('errorBanner').classList.remove('visible');
}

function showPermDenied() {
  document.getElementById('recordingView').style.display = 'none';
  document.getElementById('actionArea').style.display = 'none';
  document.getElementById('permDenied').classList.add('visible');
}

function showProgress(visible, label, pct) {
  const wrap = document.getElementById('progressWrap');
  if (!visible) { wrap.classList.remove('visible'); return; }
  wrap.classList.add('visible');
  document.getElementById('progressLabel').textContent = label || '送信中...';
  if (pct !== undefined) {
    document.getElementById('progressFill').style.width = pct + '%';
  }
}

function showDone() {
  document.getElementById('recordingView').style.display = 'none';
  document.getElementById('actionArea').style.display = 'none';
  const done = document.getElementById('doneCard');
  done.classList.add('visible');
  showProgress(false);
  // 5秒後に自動クローズ
  setTimeout(function() {
    try { window.close(); } catch(e) {}
  }, 5000);
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 2500);
}
</script>
</body>
</html>
